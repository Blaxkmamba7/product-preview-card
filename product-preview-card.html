<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Product Preview Card</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #f2ebe3;
    --dark-green: #1a4031;
    --mid-green: #3d8168;
    --gunmetal: #1c232b;
    --grey: #6c7289;
    --light-border: #e0d9d1;
  }

  body {
    font-family: 'Montserrat', sans-serif;
    min-height: 100vh;
    background: var(--cream);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .card {
    display: flex;
    width: 600px;
    max-width: 100%;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 24px 60px rgba(26,64,49,0.18);
    opacity: 0;
    transform: scale(0.96);
    animation: appear 0.6s cubic-bezier(0.22,1,0.36,1) 0.1s forwards;
  }

  @keyframes appear {
    to { opacity: 1; transform: scale(1); }
  }

  .card__image {
    width: 50%;
    background: var(--dark-green);
    position: relative;
    overflow: hidden;
    min-height: 420px;
  }
  .card__image-inner {
    width: 100%;
    height: 100%;
    background:
      linear-gradient(160deg, rgba(61,129,104,0.4) 0%, transparent 60%),
      url('https://images.unsplash.com/photo-1541643600914-78b084683702?w=400&q=80') center/cover no-repeat;
    transition: transform 0.5s ease;
  }
  .card:hover .card__image-inner { transform: scale(1.04); }

  .card__body {
    width: 50%;
    background: #fff;
    padding: 36px 32px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }

  .card__category {
    font-size: 0.68rem;
    font-weight: 500;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--grey);
    margin-bottom: 14px;
  }

  .card__title {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    line-height: 1.1;
    color: var(--gunmetal);
    margin-bottom: 18px;
  }

  .card__desc {
    font-size: 0.82rem;
    line-height: 1.75;
    color: var(--grey);
    margin-bottom: 28px;
    flex: 1;
  }

  .card__price-row {
    display: flex;
    align-items: center;
    gap: 18px;
    margin-bottom: 24px;
  }
  .card__price {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    color: var(--mid-green);
  }
  .card__price-old {
    font-size: 0.8rem;
    text-decoration: line-through;
    color: var(--grey);
  }

  .card__btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    padding: 15px;
    background: var(--mid-green);
    color: #fff;
    font-family: 'Montserrat', sans-serif;
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.25s, transform 0.15s, box-shadow 0.25s;
    box-shadow: 0 6px 20px rgba(61,129,104,0.35);
    position: relative;
    overflow: hidden;
  }
  .card__btn:hover {
    background: var(--dark-green);
    transform: translateY(-2px);
    box-shadow: 0 10px 28px rgba(26,64,49,0.35);
  }
  .card__btn:active { transform: translateY(0); }

  .card__btn .btn-icon { font-size: 1rem; transition: transform 0.2s; }
  .card__btn:hover .btn-icon { transform: rotate(-12deg) scale(1.2); }

  .card__btn.added {
    background: var(--gunmetal);
  }
  .card__btn.added::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at center, rgba(255,255,255,0.2) 0%, transparent 70%);
    animation: ripple 0.5s ease-out;
  }
  @keyframes ripple {
    from { transform: scale(0); opacity: 1; }
    to { transform: scale(3); opacity: 0; }
  }

 
  .card__qty {
    display: flex;
    align-items: center;
    gap: 0;
    border: 1.5px solid var(--light-border);
    border-radius: 8px;
    overflow: hidden;
    margin-bottom: 16px;
    width: fit-content;
  }
  .qty-btn {
    width: 36px; height: 36px;
    background: none;
    border: none;
    font-size: 1.2rem;
    color: var(--gunmetal);
    cursor: pointer;
    transition: background 0.15s;
    display: flex; align-items: center; justify-content: center;
  }
  .qty-btn:hover { background: var(--cream); }
  .qty-val {
    width: 36px;
    text-align: center;
    font-size: 0.9rem;
    font-weight: 700;
    color: var(--gunmetal);
    border-left: 1.5px solid var(--light-border);
    border-right: 1.5px solid var(--light-border);
    line-height: 36px;
  }
</style>
</head>
<body>

<article class="card">
  <div class="card__image">
    <div class="card__image-inner"></div>
  </div>

  <div class="card__body">
    <div>
      <p class="card__category">Perfume</p>
      <h2 class="card__title">Gabrielle Essence Eau De Parfum</h2>
      <p class="card__desc">
        A floral, solar and voluptuous interpretation composed by Olivier Polge,
        Perfumer-Creator for the House of CHANEL.
      </p>
    </div>

    <div>
      <div class="card__price-row">
        <span class="card__price">$149.99</span>
        <span class="card__price-old">$169.99</span>
      </div>

      <div class="card__qty">
        <button class="qty-btn" onclick="changeQty(-1)" aria-label="Decrease">−</button>
        <span class="qty-val" id="qty">1</span>
        <button class="qty-btn" onclick="changeQty(1)" aria-label="Increase">+</button>
      </div>

      <button class="card__btn" id="cartBtn" onclick="addToCart()">
        <span class="btn-icon">🛒</span>
        <span id="cartLabel">Add to Cart</span>
      </button>
    </div>
  </div>
</article>

<script>
  let qty = 1;
  let added = false;

  function changeQty(delta) {
    qty = Math.max(1, Math.min(99, qty + delta));
    document.getElementById('qty').textContent = qty;
    if (added) resetCart();
  }

  function addToCart() {
    if (added) { resetCart(); return; }
    added = true;
    const btn = document.getElementById('cartBtn');
    const label = document.getElementById('cartLabel');
    btn.classList.add('added');
    label.textContent = `✓ Added (${qty})`;

    setTimeout(resetCart, 3000);
  }

  function resetCart() {
    added = false;
    const btn = document.getElementById('cartBtn');
    const label = document.getElementById('cartLabel');
    btn.classList.remove('added');
    label.textContent = 'Add to Cart';
  }
</script>
</body>
</html>
